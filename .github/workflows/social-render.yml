name: Social cards render

# Renders the five branded social cards from the live data and commits them to
# share/. Fires automatically after every Concession Index sweep (workflow_run),
# plus its own twice-daily cron as a backstop, plus manual dispatch. Separate
# from incentive-sweep.yml on purpose, so it can never break the data/site
# publish. Optionally uploads to Google Drive if GDRIVE_SA is set.

on:
  workflow_run:
    workflows: ["Concession Index sweep"]
    types: [completed]
  schedule:
    - cron: '45 11 * * *'   # ~6:45 AM CT (CDT) backstop
    - cron: '45 23 * * *'   # ~6:45 PM CT (CDT) backstop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-render
  cancel-in-progress: false

jobs:
  render:
    # After a sweep, only render if the sweep succeeded. Cron/manual always render.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GDRIVE_SA: ${{ secrets.GDRIVE_SA }}
      GDRIVE_FOLDER: ${{ vars.GDRIVE_FOLDER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # always render from the latest main, which includes the sweep's fresh data commit
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Pull latest (the sweep may have just pushed)
        run: git pull --rebase origin main
      - name: Install dependencies
        run: npm install playwright googleapis --no-save
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Render social cards
        env:
          SOCIAL_RENDER: '1'
          SOCIAL_OUT: share
        run: node scripts/render-social.cjs
      - name: Commit rendered cards
        # Commit FIRST, then rebase with autostash, then push with retries.
        # Rebasing before the commit fails whenever the render leaves unstaged
        # changes, and a plain push loses the race if anything else lands on
        # main while Chromium was rendering (this exact race failed run 18).
        run: |
          git config user.name  "nhd-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add share/hot-sheet-read.png share/hot-sheet-move.png share/hot-sheet-explained.png share/hot-sheet-rate.png share/hot-sheet-illusion.png share/hot-sheet-board.png share/captions.txt
          if git diff --cached --quiet; then
            echo "No image changes."
          else
            git commit -m "Auto-render social cards"
            ok=0
            for i in 1 2 3; do
              git pull --rebase --autostash origin main
              if git push; then ok=1; break; fi
              echo "Push rejected, retry $i"
              sleep 5
            done
            if [ "$ok" != "1" ]; then echo "Could not push after 3 attempts"; exit 1; fi
          fi
      - name: Upload to Google Drive
        if: ${{ env.GDRIVE_SA != '' }}
        run: node scripts/upload-drive.cjs
